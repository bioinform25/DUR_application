name: 약제급여목록표 / DUR 규칙 월간 자동 갱신

on:
  schedule:
    # HIRA는 매달 1일 전후로 새 급여목록표를 게시한다.
    # 게시 시점이 며칠 앞뒤로 흔들릴 수 있어 매달 1~5일 매일 06:00(KST)에 재시도한다.
    # (스크립트가 이미 최신이면 다운로드를 건너뛰므로 여러 번 실행돼도 안전하다)
    - cron: "0 21 1-5 * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: pip install -r scripts/requirements.txt

      - name: 최신 약제급여목록표 다운로드
        run: python scripts/fetch_price_list.py

      - name: drugs.json 생성
        run: python scripts/parse_price_list.py

      - name: DUR 병용금기 규칙 갱신
        env:
          DUR_API_KEY: ${{ secrets.DUR_API_KEY }}
        run: python scripts/fetch_dur_rules.py

      - name: 변경사항 커밋 및 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "변경된 데이터가 없습니다."
          else
            git commit -m "chore: 약제급여목록표/DUR 데이터 자동 갱신 ($(date +'%Y-%m-%d'))"
            git push
          fi
