name: 약제급여목록표 / DUR 규칙 월간 자동 갱신

on:
  schedule:
    # HIRA는 매달 1일 전후로 새 급여목록표를 게시한다.
    # 게시 시점이 며칠 앞뒤로 흔들릴 수 있어 매달 1~5일 매일 06:00(KST)에 재시도한다.
    # (스크립트가 이미 최신이면 다운로드를 건너뛰므로 여러 번 실행돼도 안전하다)
    - cron: "0 21 1-5 * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-data:
    # HIRA 게시판이 GitHub 호스트 러너(클라우드 IP)의 요청을 400으로 막아서
    # 이 잡은 자체 호스트 러너(사용자 PC)에서만 실행한다.
    runs-on: self-hosted
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 의존성 설치
        shell: bash
        run: python -m pip install -r scripts/requirements.txt

      - name: 최신 약제급여목록표 다운로드
        shell: bash
        run: python scripts/fetch_price_list.py

      - name: drugs.json 생성
        shell: bash
        run: python scripts/parse_price_list.py

      - name: DUR 병용금기 규칙 갱신
        shell: bash
        env:
          DUR_API_KEY: ${{ secrets.DUR_API_KEY }}
        run: python scripts/fetch_dur_rules.py

      - name: 알약 낱알식별(모양/색깔/사진) 정보 갱신
        shell: bash
        env:
          DUR_API_KEY: ${{ secrets.DUR_API_KEY }}
        run: python scripts/fetch_pill_info.py

      - name: 마약류 법적 분류(향정신성의약품 등) 정보 갱신
        shell: bash
        env:
          DUR_API_KEY: ${{ secrets.DUR_API_KEY }}
        run: python scripts/fetch_narcotic_classification.py

      - name: 변경사항 커밋 및 푸시
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "변경된 데이터가 없습니다."
          else
            git commit -m "chore: 약제급여목록표/DUR 데이터 자동 갱신 ($(date +'%Y-%m-%d'))"
            git push
          fi
